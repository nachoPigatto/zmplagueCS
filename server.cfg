// Use this file to configure your DEDICATED server.
// This config file is executed on server start.

// disable autoaim
sv_aim 0

// disable clients' ability to pause the server
pausable 0

// Server name (change this to whatever you want)
hostname "Zombie Evil Server"

// maximum client movement speed
sv_maxspeed 320

// 20 minute timelimit
mp_timelimit 20
mp_mapcyclefile "mapcycle.txt"

sv_cheats 0

// === ZOMBIE MOD REQUIRED ===
sv_airaccelerate 100       // allows players to strafe/dodge while airborne
mp_freezetime 0            // no freeze at round start
mp_roundtime 4             // 4 minute rounds
mp_footsteps 1             // footsteps on
mp_autoteambalance 0       // don't auto-balance teams (plugin handles this)
mp_limitteams 0            // allow any team size
mp_roundrestartdelay 5     // 5 second grace period before new round
sv_restart 0

// allow clients to download custom files (maps, sounds, models)
sv_allowdownload 1
sv_allowupload 1

// FastDL - HTTP download server (much faster than game protocol)
sv_downloadurl "https://nachopigatto.github.io/zmplagueCS"

// load ban files
exec listip.cfg
exec banned.cfg
